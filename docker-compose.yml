version: '3.8'

services:
  # ── Python AI Service ──────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
      - SERVER_CALLBACK_URL=http://server:5000
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

  # ── Node.js Backend ────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - AI_SERVICE_URL=http://ai-service:8000
      - PORT=5000
    depends_on:
      - ai-service
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

  # ── React Frontend (dev server) ────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      # Browser calls these URLs — keep localhost since browser is on your machine
      - VITE_API_URL=http://localhost:5000
      - VITE_WS_URL=ws://localhost:5000
    depends_on:
      - server
    volumes:
      - ./client/src:/app/src        # hot-reload
      - ./client/public:/app/public
    restart: unless-stopped

volumes:
  uploads_data:
